<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>商品抠图与智能识别</title>
<style>
:root{font-family:Inter,"Microsoft YaHei",sans-serif;color:#172033;background:#f3f6fb}*{box-sizing:border-box}body{margin:0}.top{background:#17233d;color:#fff;padding:26px 6vw}.top h1{margin:0 0 6px}.top p{margin:0;color:#b9c5da}.wrap{max-width:1180px;margin:28px auto;padding:0 20px}.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 12px 35px #20345b12}.drop{border:2px dashed #b9c8e4;border-radius:14px;padding:34px;text-align:center;cursor:pointer}.drop:hover{border-color:#5a7cff;background:#f8faff}.btn{border:0;border-radius:10px;padding:12px 20px;background:#4568f0;color:white;font-weight:700;cursor:pointer}.btn:disabled{opacity:.5}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:22px}.stage{min-height:340px;border-radius:14px;background:#f7f9fc;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}.checker{background-color:#fff;background-image:linear-gradient(45deg,#ddd 25%,transparent 25%),linear-gradient(-45deg,#ddd 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ddd 75%),linear-gradient(-45deg,transparent 75%,#ddd 75%);background-size:24px 24px;background-position:0 0,0 12px,12px -12px,-12px 0}.stage img{max-width:100%;max-height:340px}.label{position:absolute;top:12px;left:12px;background:#17233dcc;color:#fff;border-radius:8px;padding:6px 10px}.info{margin-top:20px;display:flex;flex-wrap:wrap;gap:10px}.tag{padding:8px 12px;background:#edf2ff;color:#3451ba;border-radius:99px}.actions{margin-top:18px;display:flex;gap:12px}.status{margin:12px 0;color:#58667d}.error{color:#c93838}@media(max-width:720px){.grid{grid-template-columns:1fr}.stage{min-height:260px}}
</style></head><body>
<header class="top"><h1>商品抠图 + 智能识别</h1><p>AI 海报工作流 · 步骤 1 / 3</p></header>
<main class="wrap"><section class="card">
<div class="drop" onclick="file.click()"><strong>点击上传商品图片</strong><p>支持 JPG / PNG / WEBP，最大 10MB</p><input id="file" type="file" accept="image/*" hidden></div>
<p id="status" class="status">请选择白底或主体清晰的商品图</p>
<button id="run" class="btn" disabled>开始智能抠图</button>
<div class="grid"><div class="stage"><span class="label">原图</span><img id="before"></div><div class="stage checker"><span class="label">透明底结果</span><img id="after"></div></div>
<div id="info" class="info"></div><div class="actions"><a id="download" class="btn" style="display:none;text-decoration:none">下载透明 PNG</a></div>
</section></main>
<script>
const file=document.querySelector('#file'),run=document.querySelector('#run'),before=document.querySelector('#before'),after=document.querySelector('#after'),status=document.querySelector('#status'),info=document.querySelector('#info'),download=document.querySelector('#download');
file.onchange=()=>{if(!file.files[0])return;before.src=URL.createObjectURL(file.files[0]);after.removeAttribute('src');run.disabled=false;info.innerHTML='';download.style.display='none';status.textContent='图片已就绪，可以开始处理'};
run.onclick=async()=>{run.disabled=true;status.className='status';status.textContent='正在抠图和识别，请稍候…';const fd=new FormData();fd.append('file',file.files[0]);fd.append('user_id','1');fd.append('edge_smoothing','2');try{const res=await fetch('/api/matte/process',{method:'POST',body:fd});const body=await res.json();if(!res.ok)throw new Error(body.detail||'处理失败');const d=body.data;after.src=d.matted_url+'?t='+Date.now();status.textContent='处理完成，结果已保存到历史记录';const a=d.attributes||{};info.innerHTML=`<span class="tag">类别：${d.category} / ${d.category_en}</span><span class="tag">置信度：${Math.round(d.confidence*100)}%</span><span class="tag">颜色：${a.color||'-'}</span><span class="tag">风格：${a.style||'-'}</span><span class="tag">材质：${a.material||'-'}</span>`;download.href='/api/matte/download/'+d.id;download.style.display='inline-block'}catch(e){status.className='status error';status.textContent=e.message}finally{run.disabled=false}};
</script></body></html>
