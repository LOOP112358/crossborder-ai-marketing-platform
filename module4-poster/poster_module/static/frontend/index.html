<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>海报合成模块前端测试页</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f4f6fb;
            color: #222;
        }

        .container {
            width: 1100px;
            margin: 30px auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .left {
            width: 45%;
        }

        .right {
            width: 55%;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 15px;
        }

        button {
            margin-top: 18px;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background: #2e6bff;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #1f56d8;
        }

        .btn-gray {
            background: #666;
        }

        .btn-gray:hover {
            background: #444;
        }

        .btn-orange {
            background: #ff8a00;
        }

        .btn-orange:hover {
            background: #d97600;
        }

        .preview-box {
            min-height: 430px;
            border: 2px dashed #dcdfe6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            overflow: hidden;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 520px;
            border-radius: 8px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding: 14px 0;
        }

        .history-info {
            flex: 1;
        }

        .history-title {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .history-meta {
            color: #666;
            font-size: 14px;
        }

        .history-actions {
            display: flex;
            gap: 8px;
        }

        .history-actions a {
            text-decoration: none;
        }

        .small-btn {
            margin-top: 0;
            padding: 7px 12px;
            font-size: 13px;
        }

        .tips {
            background: #eef4ff;
            border-left: 4px solid #2e6bff;
            padding: 12px;
            margin-bottom: 20px;
            color: #333;
        }

        .status {
            margin-top: 10px;
            color: #409eff;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>海报合成模块前端测试页</h1>
    <div class="subtitle">成员4：海报合成 + 模板管理 + 历史记录 + 下载 + 收藏</div>

    <div class="tips">
        当前页面调用 FastAPI 后端接口，实现模板选择、海报生成、历史记录查询、下载和收藏功能。
    </div>

    <div class="panel">
        <h2>生成海报</h2>

        <div class="row">
            <div class="left">
                <label>选择模板</label>
                <select id="templateSelect"></select>

                <label>商品图上传</label>
<input type="file" id="productFile" accept="image/*">
<button onclick="uploadProductImage()">上传商品图</button>

<label>商品图路径</label>
<input id="mattedUrl" value="/static/demo/product.png">

<label>背景图上传</label>
<input type="file" id="bgFile" accept="image/*">
<button onclick="uploadBgImage()">上传背景图</button>

<label>背景图路径</label>
<input id="bgUrl" value="/static/demo/background.png">
                <label>标题</label>
                <input id="title" value="Portable Blender">

                <label>折扣</label>
                <input id="discount" value="30% OFF">

                <label>价格</label>
                <input id="price" value="$19.99">

                <button onclick="composePoster()">生成海报</button>
                <button class="btn-gray" onclick="fillChineseDemo()">填入中文示例</button>

                <div id="status" class="status"></div>
            </div>

            <div class="right">
                <h3>生成结果预览</h3>
                <div class="preview-box" id="previewBox">
                    暂无生成结果
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>历史记录</h2>
        <button onclick="loadHistory()">刷新历史记录</button>
        <button class="btn-orange" onclick="loadFavorites()">查看收藏列表</button>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const API_BASE = "";
    async function uploadImage(fileInputId, targetInputId, imageType) {
    const fileInput = document.getElementById(fileInputId);
    const status = document.getElementById("status");

    if (!fileInput.files || fileInput.files.length === 0) {
        alert("请先选择一张图片");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    status.textContent = imageType + "正在上传...";

    try {
        const res = await fetch(API_BASE + "/api/upload/image", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (!res.ok) {
            status.textContent = imageType + "上传失败：" + JSON.stringify(data);
            return;
        }

        document.getElementById(targetInputId).value = data.url;
        status.textContent = imageType + "上传成功：" + data.url;

    } catch (err) {
        status.textContent = imageType + "上传请求失败：" + err;
    }
}


async function uploadProductImage() {
    await uploadImage("productFile", "mattedUrl", "商品图");
}


async function uploadBgImage() {
    await uploadImage("bgFile", "bgUrl", "背景图");
}
    async function loadTemplates() {
        const res = await fetch(API_BASE + "/api/templates");
        const data = await res.json();

        const select = document.getElementById("templateSelect");
        select.innerHTML = "";

        data.forEach(item => {
            const option = document.createElement("option");
            option.value = item.id;
            option.textContent = `${item.id} - ${item.name}（使用 ${item.usage_count} 次）`;
            select.appendChild(option);
        });
    }

    async function composePoster() {
        const status = document.getElementById("status");
        status.textContent = "正在生成海报...";

        const body = {
            user_id: 1,
            matted_url: document.getElementById("mattedUrl").value,
            bg_url: document.getElementById("bgUrl").value,
            template_id: Number(document.getElementById("templateSelect").value),
            title: document.getElementById("title").value,
            discount: document.getElementById("discount").value,
            price: document.getElementById("price").value,
            ratio: "1:1"
        };

        try {
            const res = await fetch(API_BASE + "/api/poster/compose", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });

            const data = await res.json();

            if (!res.ok) {
                status.textContent = "生成失败：" + JSON.stringify(data);
                return;
            }

            status.textContent = "海报生成成功！";

            const previewBox = document.getElementById("previewBox");
            previewBox.innerHTML = `<img src="${data.poster_url}" alt="生成海报">`;

            await loadTemplates();
            await loadHistory();

        } catch (err) {
            status.textContent = "请求失败：" + err;
        }
    }

    async function loadHistory() {
        const res = await fetch(API_BASE + "/api/poster/history?user_id=1");
        const data = await res.json();

        renderHistory(data, "历史记录");
    }

    async function loadFavorites() {
        const res = await fetch(API_BASE + "/api/poster/favorites?user_id=1");
        const data = await res.json();

        renderHistory(data, "收藏列表");
    }

    function renderHistory(data, titleText) {
        const list = document.getElementById("historyList");
        list.innerHTML = `<h3>${titleText}</h3>`;

        if (!data || data.length === 0) {
            list.innerHTML += "<p>暂无数据</p>";
            return;
        }

        data.forEach(item => {
            const posterId = item.poster_id || item.id;

            const div = document.createElement("div");
            div.className = "history-item";

            div.innerHTML = `
                <div class="history-info">
                    <div class="history-title">${item.title || "未命名海报"}</div>
                    <div class="history-meta">
                        价格：${item.price || "-"} |
                        折扣：${item.discount || "-"} |
                        下载次数：${item.downloads || 0} |
                        时间：${item.created_at || "-"}
                    </div>
                    <div class="history-meta">
                        地址：${item.poster_url}
                    </div>
                </div>

                <div class="history-actions">
                    <button class="small-btn" onclick="previewPoster('${item.poster_url}')">预览</button>
                    <a href="/api/poster/download/${posterId}" target="_blank">
                        <button class="small-btn">下载</button>
                    </a>
                    <button class="small-btn btn-orange" onclick="toggleFavorite(${posterId})">收藏/取消</button>
                </div>
            `;

            list.appendChild(div);
        });
    }

    function previewPoster(url) {
        const previewBox = document.getElementById("previewBox");
        previewBox.innerHTML = `<img src="${url}" alt="生成海报">`;
        window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function toggleFavorite(posterId) {
        const res = await fetch(API_BASE + `/api/poster/favorite/${posterId}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                user_id: 1
            })
        });

        const data = await res.json();
        alert(data.message);
        await loadHistory();
    }

    function fillChineseDemo() {
        document.getElementById("title").value = "便携式榨汁杯";
        document.getElementById("discount").value = "限时七折";
        document.getElementById("price").value = "￥99";
    }

    window.onload = async function () {
        await loadTemplates();
        await loadHistory();
    };
</script>
</body>
</html>
